<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>尋找內心的狗狗靈魂 | 你是哪種狗系人格？</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ooopenlab.css">
</head>
<body>
  <div class="app-container">
    <!-- View 0: Welcome -->
    <div id="view-welcome" class="view active">
      <div class="content-wrapper">
        <h1 class="main-title">你是哪一型<br>毛孩家長？</h1>
        <p class="subtitle">面對毛孩吐了、數值微幅異常、半夜走來走去的突發狀況，你是冷靜找線索的「偵探」，還是隨時準備衝醫院的「急救員」？<br><br>透過 12 個真實日常情境，測出你最深層的照顧性格，並獲得獸醫專屬的解答與建議！</p>
        <button id="btn-start" class="btn primary">開始測驗</button>
      </div>
    </div>

    <!-- View 1: Pet Selection -->
    <div id="view-pet-selection" class="view">
      <div class="content-wrapper">
        <h2>你的毛孩是？</h2>
        <p class="subtitle">這將幫助我們為你量身打造結果</p>
        <div class="options-grid">
          <button class="btn option-btn pet-option" data-pet="cat">
            <span class="emoji">🐱</span>
            <span class="label">貓咪主子</span>
          </button>
          <button class="btn option-btn pet-option" data-pet="dog">
            <span class="emoji">🐶</span>
            <span class="label">汪星人</span>
          </button>
          <button class="btn option-btn pet-option" data-pet="other">
            <span class="emoji">🐰</span>
            <span class="label">其他寶貝</span>
          </button>
        </div>
      </div>
    </div>

    <!-- View 2: Quiz -->
    <div id="view-quiz" class="view">
      <div class="quiz-header">
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="progress-text"><span id="current-q-num">1</span> / 12</div>
      </div>
      <div class="content-wrapper quiz-wrapper">
        <h2 id="question-text" class="question-text"></h2>
        <div id="options-container" class="options-grid">
          <!-- Options injected via JS -->
        </div>
      </div>
    </div>

    <!-- View 3: Result -->
    <div id="view-result" class="view">
      <div class="content-wrapper result-wrapper">
        <div class="result-card" id="result-card">
          <img id="result-image" class="result-image" src="" alt="測驗結果插圖" style="width: 100%; border-radius: 16px; margin-bottom: 24px;">
          <div class="result-header">
            <span class="type-subtitle" id="result-subtitle"></span>
            <h2 class="type-name" id="result-name"></h2>
          </div>
          <div class="result-body">
            <div class="quote" id="result-hook"></div>
            <p class="description" id="result-description"></p>
            <div class="divider"></div>
            <div class="solution-box">
              <h3>💡 獸醫給你的專屬建議</h3>
              <p id="result-advice"></p>
            </div>
          </div>
        </div>
        
        <div class="waitlist-section">
          <h3 id="cta-text"></h3>
          <p class="waitlist-desc">留下 Email，成為首批體驗「遠端獸醫諮詢」的家長，終結資訊焦慮。</p>
          <form id="waitlist-form" class="waitlist-form">
            <input type="email" id="email-input" placeholder="輸入你的 Email" required>
            <button type="submit" class="btn primary" id="submit-btn">加入 Waitlist</button>
          </form>
          <div id="success-msg" class="success-msg hidden">
            ✨ 成功加入！我們很快會與你聯繫。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
